# Nothing applied to: W_7_eWQJmiy9A0OcIdq_nA, JogEgwk7IvcRyLaWR2WCLw, zH8hNpcXO_7by0Q5faQcFw, ZyEDcakA79CwJ5AmGa9jpg

edits:
# Accelerate car by 2x
- type: accelerate_trajectory
  object: dI7HGZ0DFHdRuppxTPRYsA
  speed: 2.0
# Swap two objects
- type: swap_trajectories
  object1: ME9nKO-5iqJoJ_2iKeLJ8A
  object2: RxY8g0xFolmZ0x3GqR2e4g

# Stop a car after a timestamp
- type: stop_vehicle
  object: RxY8g0xFolmZ0x3GqR2e4g
  # The timestamp is relative to the scene's start time
  time: 5.

# Make a small version of a car
- type: duplicate
  object: WGaP1ouWRm0hyWoc8T6BjQ
  # New object ID will be the above one with this suffix
  # This is the default if not specified
  suffix: _small
  # Offset the trajectory times
  offset: 3.0
- type: rescale
  object: WGaP1ouWRm0hyWoc8T6BjQ_small
  # Rescale the copy
  scale: 0.6

# Make a big version of a car
- type: duplicate
  object: ENMUX7tRH8w3_oTHvkS-nQ
  # New object ID will be the above one with this suffix
  # This is the default if not specified
  suffix: _big
  # Offset the trajectory times
  offset: 3.0
- type: rescale
  object: ENMUX7tRH8w3_oTHvkS-nQ_big
  # Rescale the copy
  scale: 1.3

# Reverse a car
- type: reverse
  object: uiew--wAKXyif3TRrGwJRA
