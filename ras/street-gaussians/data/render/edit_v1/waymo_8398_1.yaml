edits:
# Duplicate a car
- type: duplicate
  object: 0xDZFWv3y1YqtrzzYyHlFw
  # New object ID will be the above one with this suffix
  # This is the default if not specified
  suffix: _small
  # Offset the trajectory times
  offset: 5.0
- type: rescale
  object: 0xDZFWv3y1YqtrzzYyHlFw_small
  # Rescale the copy
  scale: 0.8
# Duplicate another car
- type: duplicate
  object: gFByle98hPh7nsp83IGHTA
  suffix: _big
  offset: 5.0
- type: rescale
  object: gFByle98hPh7nsp83IGHTA_big
  # Rescale this copy differently
  scale: 1.2
